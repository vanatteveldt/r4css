project:
  type: book
  output-dir: _book
  resources:
    - data/

book:
  title: "R for Computational Social Science"
  author: "Your Name"
  date: today
  date-format: "YYYY"
  repo-url: https://github.com/vanatteveldt/r4css
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Data Analysis with Tidyverse"
      chapters:
        - chapters/02-funwithr.qmd
        - chapters/03-tidyverse.qmd
        - chapters/04-cleaning.qmd
        - chapters/05-transforming.qmd
        - chapters/06-visualizing.qmd
        - chapters/07-reshaping.qmd
    - part: "Text and Image Analysis"
      chapters:
        - chapters/08-stringr.qmd
        - chapters/09-scraping.qmd
        - chapters/10-tidytext.qmd
        - chapters/11-llms.qmd
        - chapters/12-images.qmd
    - part: "Machine Learning"
      chapters:
        - chapters/13-tidymodels.qmd
        - chapters/14-textclassification.qmd
        - chapters/15-dimensionality.qmd
        - chapters/16-torch.qmd
    - part: "Programming Concepts"
      chapters:
        - chapters/17-flowcontrol.qmd
        - chapters/18-datastructures.qmd
        - chapters/19-software.qmd
    - chapters/references.qmd

bibliography: references.bib

format:
  live-html:
    theme:
      - flatly
      - style.scss
    fontsize: 0.9em
    toc: true
    number-sections: true
    number-depth: 2

engine: knitr

execute:
  echo: true
  warning: false
  message: false
