project:
  type: book
  output-dir: _book
  resources:
    - data/

book:
  title: "R for Computational Social Science"
  author: "Your Name"
  date: today
  date-format: "YYYY"
  repo-url: https://github.com/vanatteveldt/r4css
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters:
        - chapters/02-funwithr.qmd
        - chapters/03-tidydata.qmd
    - chapters/references.qmd

bibliography: references.bib

format:
  live-html:
    theme:
      - flatly
      - style.scss
    fontsize: 0.9em
    toc: true
    number-sections: true
    number-depth: 2

engine: knitr

execute:
  echo: true
  warning: false
  message: false
